name: CI — Pruebas Dinámicas (Fase 2)

# Se activa cuando el equipo de desarrollo entrega el código con pruebas unitarias.
# Todas las suites corren sobre H2 (perfil "test") y generan reporte JaCoCo.
# La suite "regresion" es el gate; "defecto-conocido" es informativa y no
# bloquea el merge. El análisis SonarCloud vive únicamente en ci-static.yml
# para evitar el doble scan sobre el mismo projectKey (ver issue #8).

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/test/**'
      - 'src/main/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/test/**'
      - 'src/main/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  tests:
    name: mvn test + JaCoCo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Ejecutar suite regresion (gate) con cobertura JaCoCo
        run: ./mvnw test -Dgroups=regresion -DfailIfNoTests=true jacoco:report --no-transfer-progress

      - name: Ejecutar suite defecto-conocido (informativa)
        continue-on-error: true
        run: ./mvnw test -Dgroups=defecto-conocido -DfailIfNoTests=false jacoco:report --no-transfer-progress

      - name: Publicar reporte JaCoCo como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 30
          if-no-files-found: ignore

      - name: Publicar resultados de pruebas (JUnit XML)
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: 'target/surefire-reports/*.xml'
          check_name: 'Resultados de Pruebas JUnit'
