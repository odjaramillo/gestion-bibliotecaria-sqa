name: WF5 — Generador de PAC

on:
  workflow_dispatch:

env:
  DRY_RUN: false

jobs:
  wf5-generador-pac:
    name: Ejecutar WF5 Generador de PAC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Configurar PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Ejecutar WF5 Generador de PAC
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DRY_RUN: ${{ env.DRY_RUN }}
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/wf_pac_generator.py --config sqa/pac_config.yaml --output sqa/pac_generado.md

      - name: Subir PAC generado como artifact
        uses: actions/upload-artifact@v4
        with:
          name: pac-generado
          path: sqa/pac_generado.md
          if-no-files-found: warn

      - name: Subir reportes de resumen como artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wf5-reportes
          path: sqa/reportes/*_wf_pac_summary.json
          if-no-files-found: warn
