name: WF4 — Orquestador de Quality Gates

on:
  workflow_dispatch:
    inputs:
      modo:
        description: 'Modo de ejecución'
        required: true
        default: 'reporte'
        type: choice
        options:
          - reporte
          - propuesta
          - produccion
  pull_request:
    paths:
      - 'sqa/checklists/**'
      - 'scripts/wf4_orquestador.py'
      - '.github/workflows/wf4_orquestador.yml'
      - 'requirements.txt'

env:
  MODO: ${{ inputs.modo || 'reporte' }}

jobs:
  wf4-quality-gates:
    name: Ejecutar WF4 Orquestador
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Configurar PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Ejecutar WF4 Orquestador
        env:
          MODO: ${{ env.MODO }}
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/wf4_orquestador.py

      - name: Subir reporte como artifact
        uses: actions/upload-artifact@v4
        with:
          name: wf4-reporte
          path: sqa/reportes/*_wf4_reporte.md
          if-no-files-found: warn
