name: Sync Labels

# Sincroniza .github/labels.yml -> etiquetas reales del repositorio.
# La taxonomía de etiquetas es la fuente única de verdad de la trazabilidad SQA.

on:
  push:
    branches: [main, develop]
    paths:
      - '.github/labels.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    name: Sync labels to GitHub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # `gh label` no tiene subcomando `sync`; se usa una acción dedicada que
      # toma .github/labels.yml como fuente de verdad (crea/actualiza etiquetas).
      - name: Sync labels
        uses: crazy-max/ghaction-github-labeler@v6.0.0
        with:
          yaml-file: .github/labels.yml
          skip-delete: true   # no borra etiquetas ausentes del archivo
          github-token: ${{ secrets.GITHUB_TOKEN }}
