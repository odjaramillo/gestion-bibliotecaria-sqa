name: CI — Pruebas de Aceptación (Playwright)

# Nivel de aceptación de la capa de Fiabilidad (TCS-FIAB-001). Ejercita el
# frontend Vue contra el backend Spring Boot real — el único nivel que cruza
# la frontera frontend/backend (ver PACS.md §5.1).
#
# A diferencia de ci-tests.yml (unitaria/integración/sistema sobre H2), la
# aceptación corre contra MySQL, que es el motor que se despliega: probar
# aceptación contra H2 sería probar un sistema distinto del real. MySQL se
# levanta como service container con las credenciales de application.properties.
#
# Se activa solo cuando cambia el frontend, el backend o esta propia definición,
# para no pagar el arranque de navegador en PRs que solo tocan documentos.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
    paths:
      - "biblioteca-frontend/**"
      - "src/**"
      - "pom.xml"
      - ".github/workflows/ci-e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aceptacion:
    name: Playwright e2e (Vue + Spring Boot + MySQL)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: biblioteca_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -padmin --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: biblioteca-frontend/package-lock.json

      - name: Instalar dependencias del frontend
        working-directory: biblioteca-frontend
        run: npm ci

      - name: Instalar navegador Playwright (Chromium)
        working-directory: biblioteca-frontend
        run: npx playwright install --with-deps chromium

      # Playwright levanta el backend (./mvnw spring-boot:run) y el dev server
      # (npm run serve) vía webServer; el globalSetup siembra el estado por API.
      - name: Ejecutar pruebas de aceptación
        working-directory: biblioteca-frontend
        run: npm run test:e2e

      - name: Publicar reporte Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: biblioteca-frontend/playwright-report/
          retention-days: 30
          if-no-files-found: ignore
