name: CI — Análisis Estático

# Ejecuta análisis estático sobre el backend Java.
# No modifica el código fuente — solo audita y reporta.
# SonarCloud requiere que el secret SONAR_TOKEN esté configurado
# en Settings → Secrets → Actions del repositorio.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  static-analysis:
    name: Checkstyle + SpotBugs + PMD + SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud necesita historial completo

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Compilar sin ejecutar tests
        run: ./mvnw compile -DskipTests --no-transfer-progress

      - name: Checkstyle
        run: ./mvnw checkstyle:check --no-transfer-progress
        continue-on-error: true   # Reportar pero no bloquear el pipeline en Fase 1

      - name: SpotBugs
        run: ./mvnw spotbugs:check --no-transfer-progress
        continue-on-error: true

      - name: PMD
        run: ./mvnw pmd:check --no-transfer-progress
        continue-on-error: true

      - name: Publicar reportes de análisis estático como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            target/checkstyle-result.xml
            target/spotbugsXml.xml
            target/pmd.xml
          retention-days: 30
          if-no-files-found: ignore

      - name: SonarCloud Scan
        # Solo corre si SONAR_TOKEN está configurado (evita fallar en forks/PRs externos).
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # SonarScanner for Maven, no la action de scanner CLI: SonarSource la
        # desaconseja explícitamente para proyectos Maven. El plugin deriva
        # sources, tests y binaries del pom.xml. Conexión: <properties> del pom.
        # Versión fijada para que el análisis sea reproducible.
        run: >
          ./mvnw org.sonarsource.scanner.maven:sonar-maven-plugin:5.1.0.4751:sonar
          --no-transfer-progress
