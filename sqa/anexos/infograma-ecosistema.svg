<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1000" width="1240" height="1000"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
     role="img" aria-labelledby="titulo descripcion">
  <title id="titulo">Infograma del Ecosistema Tecnologico SQA — Equipo 11, Proyecto 16</title>
  <desc id="descripcion">Esquema de integracion del ecosistema SQA, organizado en cinco capas. Capa 1, fuente y gobernanza: repositorio GitHub con el SUT, issues con taxonomia de 34 etiquetas, pull requests como evidencia de peer-review IEEE 730 y tablero Projects v2. Capa 2, disparadores: push a main y develop, pull request hacia main, cron semanal y ejecucion manual. Capa 3, automatizacion con seis workflows de GitHub Actions divididos en gates de calidad (ci-static, ci-tests, ci-metricas) y automatizacion de trazabilidad (sync-labels, pr-project, pages-dashboard). Capa 4, evidencia generada: SonarCloud, jacoco.xml, reportes Surefire e issues_export.json. Capa 5, metricas y publicacion: calcular_kpi.py produce reporte_kpi.json, generar_dashboard.py produce el sitio y GitHub Pages lo publica para el docente. Al pie, el marco normativo aplicado. Dos huecos conocidos se senalan en ambar: SonarCloud analiza sin datos de cobertura (issue 31) y el nivel de pruebas de aceptacion esta ausente (issue 34).</desc>

  <defs>
    <marker id="flecha" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6e7681"/>
    </marker>
    <marker id="flecha-acento" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4493f8"/>
    </marker>
  </defs>

  <rect width="1240" height="1000" fill="#0d1117"/>

