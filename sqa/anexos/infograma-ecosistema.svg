    <text x="452" y="476" font-size="11" fill="#6e7681">regresión = gate · defecto-conocido = informativo</text>
    <text x="452" y="493" font-size="11" fill="#e3b341">Aceptación (Playwright): ausente — #34</text>
  </g>
