  <text x="32" y="68" font-size="13" fill="#9aa4b2">Equipo 11 · Proyecto 16 — integración de herramientas de aseguramiento de la calidad, 100 % nativa de GitHub</text>
  <text x="1208" y="46" font-size="12" fill="#6e7681" text-anchor="end">Apéndice del PACS · issue #9</text>
  <text x="1208" y="66" font-size="12" fill="#6e7681" text-anchor="end">Estado verificado: 2026-07-12</text>
  <line x1="32" y1="86" x2="1208" y2="86" stroke="#21262d" stroke-width="1"/>

